<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Republic Stock Tracker</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Trade Republic Stock Tracker</h1>
            <p>Monitor your portfolio performance in real-time</p>
        </header>

        <main>
            <!-- Portfolio Summary -->
            <section class="summary-section">
                <div class="summary-card">
                    <h2>Portfolio Summary</h2>
                    <div class="summary-grid">
                        <div class="stat">
                            <label>Total Invested</label>
                            <p id="totalInvested" class="value">$0.00</p>
                        </div>
                        <div class="stat">
                            <label>Total Profit/Loss</label>
                            <p id="totalPL" class="value">$0.00</p>
                        </div>
                        <div class="stat">
                            <label>Return %</label>
                            <p id="returnPercent" class="value">0.00%</p>
                        </div>
                        <div class="stat">
                            <label>Total Stocks</label>
                            <p id="stockCount" class="value">0</p>
                        </div>
                        <div class="stat">
                            <label>Total Trades</label>
                            <p id="tradeCount" class="value">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Stocks Performance Table -->
            <section class="stocks-section">
                <div class="section-header">
                    <h2>Stocks by Performance (Best to Worst)</h2>
                    <button id="refreshBtn" class="btn btn-primary">Refresh</button>
                </div>
                <div class="table-container">
                    <table id="stocksTable">
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Profit/Loss</th>
                                <th>Return %</th>
                                <th>Trades</th>
                                <th>Total Invested</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="stocksTableBody">
                            <tr>
                                <td colspan="6" class="loading">Loading stocks...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Add Trade Form -->
            <section class="form-section">
                <h2>Add New Trade</h2>
                <form id="addTradeForm" class="trade-form">
                    <div class="form-group">
                        <label for="symbol">Symbol</label>
                        <input type="text" id="symbol" placeholder="e.g., AAPL" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" step="0.01" placeholder="e.g., 10" required>
                    </div>
                    <div class="form-group">
                        <label for="entryPrice">Entry Price</label>
                        <input type="number" id="entryPrice" step="0.01" placeholder="e.g., 150.00" required>
                    </div>
                    <div class="form-group">
                        <label for="entryDate">Entry Date</label>
                        <input type="datetime-local" id="entryDate" required>
                    </div>
                    <div class="form-group">
                        <label for="exitPrice">Exit Price (optional)</label>
                        <input type="number" id="exitPrice" step="0.01" placeholder="Leave empty if open">
                    </div>
                    <div class="form-group">
                        <label for="exitDate">Exit Date (optional)</label>
                        <input type="datetime-local" id="exitDate">
                    </div>
                    <button type="submit" class="btn btn-success">Add Trade</button>
                </form>
            </section>

            <!-- Stock Details Modal -->
            <div id="detailsModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2 id="modalTitle">Stock Details</h2>
                    <div id="modalBody"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
