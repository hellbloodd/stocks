<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TR Stock Analysis Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root { --bg: #0b0f14; --card: #161b22; --accent: #38a57d; --danger: #f85149; --text: #c9d1d9; --border: #30363d; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; max-width: 1400px; margin: auto; }
    
    /* Dashboard Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .card { background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); border-color: #58a6ff; }
    
    /* Inputs */
    .search-box { display: flex; gap: 1rem; margin-bottom: 2rem; }
    input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 1rem; font-size: 1.1rem; width: 100%; border-radius: 8px; }
    button { background: var(--accent); color: white; border: none; padding: 0 1.5rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; }
    button:hover { filter: brightness(1.1); }

    /* Analysis Specifics */
    .big-number { font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; line-height: 1; }
    .label { color: #8b949e; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Indicators */
    .risk-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-top: 5px; font-size: 0.9rem; }
    .risk-low { background: #0f3d2e; color: #3fb950; }
    .risk-med { background: #3c2f1b; color: #d29922; }
    .risk-high { background: #4a1515; color: #f85149; }

    /* Table */
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
    th { text-align: left; color: #8b949e; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 0; border-bottom: 1px solid var(--border); }

    .hidden { display: none !important; }
    canvas { max-width: 100%; height: 350px; margin-top: 1rem; background: #0d1117; border-radius: 8px; padding: 10px; box-sizing: border-box; }
  </style>
</head>
<body>

  <h1>📈 Stock Analysis Pro</h1>
  
  <div class="search-box">
    <input type="text" id="tickerInput" placeholder="Enter ticker (e.g., AAPL, TSLA, SAP)" />
    <button onclick="loadStock()">Analyze Stock</button>
  </div>

  <div id="loading" class="hidden">⏳ Fetching Wall Street Data...</div>

  <div id="dashboard" class="grid hidden">
    
    <!-- Price & Name -->
    <div class="card" style="border-left: 4px solid var(--accent);">
      <span class="label">Price</span>
      <div class="big-number" id="price">$0.00</div>
      <div id="name" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;"></div>
    </div>

    <!-- Analyst Rating (Wall Street Consensus) -->
    <div class="card">
      <span class="label">Analyst Consensus</span>
      <div class="big-number" id="analyst-rating" style="color: #d29922;">N/A</div>
      <p id="target-price" style="margin-top: 5px; color: #8b949e;"></p>
    </div>

    <!-- Technical Score (Buy/Sell Signal) -->
    <div class="card">
      <span class="label">Technical Score</span>
      <div class="big-number" id="tech-score">0/100</div>
      <p id="signal-text" style="margin-top: 5px; font-weight: bold;"></p>
    </div>

    <!-- Risk Analysis -->
    <div class="card">
      <span class="label">Risk Level</span>
      <div id="risk-meter"></div>
      <div style="font-size: 0.9rem; color: #8b949e; margin-top: 8px;">
        Beta: <span id="beta-val" style="color:white">-</span> 
        | 52W Range: <span id="range-val" style="color:white">-</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="card" style="grid-column: span 2;">
      <span class="label">6-Month Price Action</span>
      <canvas id="priceChart"></canvas>
    </div>

    <!-- Stats -->
    <div class="card">
      <span class="label">Key Metrics</span>
      <table style="width:100%">
        <tr><td>P/E Ratio</td><td id="pe-ratio" style="text-align:right; color:white;"></td></tr>
        <tr><td>Market Cap</td><td id="mcap" style="text-align:right; color:white;"></td></tr>
        <tr><td>Div Yield</td><td id="div-yield" style="text-align:right; color:white;"></td></tr>
      </table>
    </div>
    
     <!-- Technicals -->
     <div class="card">
      <span class="label">Indicators (14)</span>
      <table style="width:100%">
        <tr><td>RSI</td><td id="rsi-val" style="text-align:right; color:white;"></td></tr>
        <tr><td>Trend</td><td id="trend-val" style="text-align:right; color:white;"></td></tr>
      </table>
    </div>

  </div>

<script>
  let chart = null;

  async function loadStock() {
    const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
    if (!ticker) return;

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');

    try {
      // Fetch all data from your Render backend
      const res = await fetch(`https://stocks-yohw.onrender.com/stock/${ticker}`);
      if (!res.ok) throw new Error("Ticker not found.");
      
      const d = await res.json();

      // 1. Update Price & Name
      document.getElementById('price').innerText = `${d.currency === 'EUR' ? '€' : '$'}${d.price.toFixed(2)}`;
      document.getElementById('name').innerText = `${d.name} (${d.symbol})`;
      
      // 2. Update Analysts
      const rat = d.recommendation || "N/A";
      document.getElementById('analyst-rating').innerText = rat;
      document.getElementById('analyst-rating').style.color = (rat.includes("BUY") || rat.includes("STRONG BUY")) ? "#3fb950" : (rat.includes("SELL") ? "#f85149" : "#d29922");
      document.getElementById('target-price').innerText = d.analyst_target_price ? `Target: $${d.analyst_target_price}` : "No target data";

      // 3. Update Tech Score & Signal
      const score = d.technical_score;
      document.getElementById('tech-score').innerText = `${score}/100`;
      let signal = "NEUTRAL";
      if(score > 65) { signal = "STRONG BUY (Oversold / Uptrend)"; document.getElementById('signal-text').style.color = "#3fb950"; }
      else if(score < 35) { signal = "OVERBOUGHT (Caution)"; document.getElementById('signal-text').style.color = "#f85149"; }
      else { signal = "NEUTRAL / CONSOLIDATION"; document.getElementById('signal-text').style.color = "#8b949e"; }
      document.getElementById('signal-text').innerText = signal;

      // 4. Update Risk Meter
      const risk = d.risk_info;
      let riskClass = "risk-low";
      if (risk.risk_level === "MEDIUM") riskClass = "risk-med";
      if (risk.risk_level === "HIGH") riskClass = "risk-high";
      
      document.getElementById('risk-meter').innerHTML = `<span class="risk-badge ${riskClass}">${risk.risk_level} RISK</span>`;
      document.getElementById('beta-val').innerText = risk.beta ? `${risk.beta}x` : "N/A";
      document.getElementById('range-val').innerText = `${d.history[0].Low.toFixed(2)} - ${d.history[0].High.toFixed(2)}`;

      // 5. Update Metrics Table
      document.getElementById('pe-ratio').innerText = d.pe_ratio ? d.pe_ratio.toFixed(2) : "N/A";
      document.getElementById('mcap').innerText = (d.market_cap / 1e9).toFixed(2) + "B";
      document.getElementById('div-yield').innerText = d.dividend_yield ? `${d.dividend_yield.toFixed(2)}%` : "0.00%";

      // 6. Update Indicators Table
      document.getElementById('rsi-val').innerText = d.rsi_14 ? d.rsi_14.toFixed(1) : "N/A";
      document.getElementById('trend-val').innerText = (d.history[0].High / d.history[0].Low) > 2 ? "Volatile" : "Stable";

      // 7. Render Chart
      renderChart(d.history);

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

    } catch (err) {
      document.getElementById('loading').innerText = `❌ Error: ${err.message}`;
    }
  }

  function renderChart(history) {
    const ctx = document.getElementById('priceChart').getContext('2d');
    if (chart) chart.destroy();
    
    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: history.map(h => h.Date),
        datasets: [{
          label: "Price",
          data: history.map(h => h.Close),
          borderColor: "#58a6ff",
          backgroundColor: "rgba(88, 166, 255, 0.1)",
          fill: true,
          tension: 0.3
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  // Auto-load on enter key
  document.getElementById('tickerInput').addEventListener("keyup", function(event) {
    if (event.key === "Enter") loadStock();
  });
</script>

</body>
</html>
